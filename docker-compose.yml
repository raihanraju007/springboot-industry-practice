version: '3.8'

services:

#  app:
#    build: .
#    container_name: spring-app
#    ports:
#      - "8080:8080"
#    depends_on:
#      - postgres
#      - redis
#    env_file:
#      - .env

  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: springboot_industry_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6380:6379"

volumes:
  pg_data:

networks:
    default:
      driver: bridge