spring.application.name=springboot-industry-practice

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/springboot_industry_practice
spring.datasource.username=postgres
spring.datasource.password=root

#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== STEP-BY-STEP MIGRATION TESTING =====
# Enable ONLY ONE tool at a time. Both default to "enabled" when on the
# classpath, so the one you are NOT testing must be explicitly set to false.

# ----- Liquibase (currently OFF) -----
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ----- Flyway (currently ON) -----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# To test Liquibase instead: set flyway.enabled=false and liquibase.enabled=true


spring.data.redis.host=localhost
spring.data.redis.port=6379